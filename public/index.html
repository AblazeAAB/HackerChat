<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HACKERCHAT // OPEN NETWORK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --cyan: #00ffff;
      --dark: #000000;
      --dark2: #050f05;
      --dark3: #0a1a0a;
      --border: #00ff4133;
      --dim: #00ff4166;
      --red: #ff0044;
      --yellow: #fff200;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* CRT flicker */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ─── BOOT SCREEN ─── */
    #boot {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }

    #boot.hidden { display: none; }

    .boot-logo {
      font-family: 'VT323', monospace;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px var(--green);
      letter-spacing: 0.1em;
      margin-bottom: 0.2em;
      animation: flicker 3s infinite;
    }

    .boot-sub {
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.3em;
      margin-bottom: 3rem;
      text-transform: uppercase;
    }

    .boot-lines {
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
      font-size: 0.72rem;
      color: var(--dim);
      line-height: 1.8;
      min-height: 7em;
    }

    .boot-line { opacity: 0; animation: fadeIn 0.1s forwards; }
    .boot-line.ok::after { content: '  [OK]'; color: var(--green); }
    .boot-line.err::after { content: '  [!!]'; color: var(--red); }

    .join-form {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      background: var(--dark2);
      display: none;
      animation: fadeIn 0.4s forwards;
    }

    .join-form.visible { display: block; }

    .join-label {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-bottom: 0.6rem;
      display: block;
    }

    .join-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .prompt-char {
      color: var(--green);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    #nameInput {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      outline: none;
      padding: 0.2rem 0.4rem;
      caret-color: var(--green);
    }

    #nameInput::placeholder { color: var(--dim); }

    .join-btn {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      padding: 0.35rem 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .join-btn:hover {
      background: var(--green);
      color: var(--dark);
    }

    /* ─── MAIN CHAT ─── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    #app.visible { display: flex; }

    /* Header */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--dark2);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-text {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      color: var(--green);
      text-shadow: 0 0 10px var(--green);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      font-size: 0.7rem;
      color: var(--dim);
    }

    .user-count {
      color: var(--cyan);
      letter-spacing: 0.1em;
    }

    .my-tag {
      padding: 0.15rem 0.5rem;
      border: 1px solid;
      font-size: 0.7rem;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); }

    .msg {
      display: flex;
      gap: 0.6rem;
      line-height: 1.5;
      font-size: 0.88rem;
      animation: slideIn 0.15s ease-out;
      padding: 0.1rem 0;
    }

    .msg-time {
      flex-shrink: 0;
      color: #00ff4144;
      font-size: 0.7rem;
      padding-top: 0.18rem;
      user-select: none;
    }

    .msg-name {
      flex-shrink: 0;
      font-weight: bold;
      min-width: 8ch;
      text-align: right;
    }

    .msg-sep {
      color: var(--border);
      flex-shrink: 0;
    }

    .msg-text {
      color: #ccffcc;
      word-break: break-word;
      flex: 1;
    }

    .msg.system {
      justify-content: center;
      color: #00ff4144;
      font-size: 0.7rem;
      font-style: italic;
      padding: 0.3rem 0;
    }

    .msg.own .msg-text { color: #ffffff; }

    /* Typing indicator */
    #typingBar {
      padding: 0.3rem 1rem;
      font-size: 0.68rem;
      color: var(--dim);
      min-height: 1.4rem;
      letter-spacing: 0.05em;
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--dark2);
      padding: 0.7rem 1rem;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .input-prompt {
      color: var(--green);
      font-size: 1rem;
      flex-shrink: 0;
      user-select: none;
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.92rem;
      outline: none;
      caret-color: var(--green);
    }

    #msgInput::placeholder { color: #00ff4133; }

    .send-btn {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.15s;
    }

    .send-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .char-count {
      font-size: 0.65rem;
      color: #00ff4133;
      flex-shrink: 0;
      min-width: 3ch;
      text-align: right;
    }

    .char-count.near { color: var(--yellow); }
    .char-count.over { color: var(--red); }

    /* Connection banner */
    #reconnectBanner {
      display: none;
      background: var(--red);
      color: #000;
      text-align: center;
      font-size: 0.75rem;
      padding: 0.3rem;
      letter-spacing: 0.1em;
      animation: blink 1s infinite;
    }

    #reconnectBanner.visible { display: block; }

    /* Animations */
    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 0.9; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .msg-time { display: none; }
      .msg-name { min-width: 6ch; }
      .header-right .user-count { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── BOOT SCREEN ─── -->
<div id="boot">
  <div class="boot-logo">HACKERCHAT</div>
  <div class="boot-sub">// open network // no auth required //</div>

  <div class="boot-lines" id="bootLines"></div>

  <div class="join-form" id="joinForm">
    <span class="join-label">// IDENTIFY YOURSELF TO ENTER THE NETWORK</span>
    <div class="join-row">
      <span class="prompt-char">root@net:~$</span>
      <input id="nameInput" type="text" placeholder="enter_handle" maxlength="20" autocomplete="off" spellcheck="false" />
      <button class="join-btn" onclick="joinNetwork()">CONNECT</button>
    </div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app">
  <div id="reconnectBanner">⚠ CONNECTION LOST — RECONNECTING...</div>

  <div class="header">
    <div class="header-left">
      <div class="status-dot" id="statusDot"></div>
      <span class="logo-text">HACKERCHAT</span>
    </div>
    <div class="header-right">
      <span class="user-count" id="userCount">⬡ 0 online</span>
      <span class="my-tag" id="myTag" style="border-color: #00ff41; color: #00ff41;"></span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div id="typingBar"></div>

  <div class="input-area">
    <div class="input-row">
      <span class="input-prompt" id="inputPrompt">$</span>
      <input id="msgInput" type="text" placeholder="type your message..." maxlength="500" autocomplete="off" spellcheck="false" />
      <span class="char-count" id="charCount">500</span>
      <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>

<script>
  // ─── State ───
  let ws = null;
  let myName = '';
  let myColor = '#00ff41';
  let myId = null;
  let typingTimeout = null;
  let reconnectTimer = null;
  let typingClearTimers = {};

  // ─── Boot Sequence ───
  const bootMessages = [
    { text: 'Initializing neural mesh...', delay: 0, cls: 'ok' },
    { text: 'Scanning open channels...', delay: 350, cls: 'ok' },
    { text: 'Bypassing auth layer...', delay: 700, cls: 'ok' },
    { text: 'Establishing encrypted tunnel...', delay: 1050, cls: 'ok' },
    { text: 'WARNING: Identity unverified', delay: 1400, cls: 'err' },
    { text: 'Network access: GRANTED', delay: 1750, cls: 'ok' },
  ];

  function runBoot() {
    const container = document.getElementById('bootLines');
    bootMessages.forEach(({ text, delay, cls }) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = `boot-line ${cls}`;
        el.textContent = text;
        el.style.animationDelay = '0s';
        container.appendChild(el);
      }, delay);
    });
    setTimeout(() => {
      document.getElementById('joinForm').classList.add('visible');
      document.getElementById('nameInput').focus();
    }, 2100);
  }

  runBoot();

  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinNetwork();
  });

  // ─── Join ───
  function joinNetwork() {
    const raw = document.getElementById('nameInput').value.trim();
    if (!raw) return;
    myName = raw.slice(0, 20);
    document.getElementById('boot').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    connectWS();
  }

  // ─── WebSocket ───
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      setOnline(true);
      ws.send(JSON.stringify({ type: 'join', name: myName }));
      if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
      document.getElementById('reconnectBanner').classList.remove('visible');
    };

    ws.onmessage = ({ data }) => {
      let msg;
      try { msg = JSON.parse(data); } catch { return; }
      handleMsg(msg);
    };

    ws.onclose = () => {
      setOnline(false);
      document.getElementById('reconnectBanner').classList.add('visible');
      scheduleReconnect();
    };

    ws.onerror = () => ws.close();
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connectWS();
    }, 3000);
  }

  function setOnline(on) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (on ? '' : ' offline');
  }

  // ─── Message Handler ───
  function handleMsg(msg) {
    if (msg.type === 'identity') {
      myId = msg.id;
      myColor = msg.color;
      const tag = document.getElementById('myTag');
      tag.textContent = `[${msg.name}]`;
      tag.style.borderColor = msg.color;
      tag.style.color = msg.color;
      document.getElementById('inputPrompt').style.color = msg.color;
      document.getElementById('inputPrompt').textContent = `${msg.name}$`;
      return;
    }

    if (msg.type === 'history') {
      msg.messages.forEach(renderMsg);
      scrollBottom();
      return;
    }

    if (msg.type === 'userCount') {
      document.getElementById('userCount').textContent = `⬡ ${msg.count} online`;
      return;
    }

    if (msg.type === 'typing') {
      showTyping(msg.name, msg.color);
      return;
    }

    renderMsg(msg);
    scrollBottom();
  }

  // ─── Render ───
  function renderMsg(msg) {
    const container = document.getElementById('messages');

    if (msg.type === 'system') {
      const el = document.createElement('div');
      el.className = 'msg system';
      el.textContent = `── ${msg.text} ──`;
      container.appendChild(el);
      return;
    }

    if (msg.type === 'message') {
      const isOwn = msg.userId === myId;
      const el = document.createElement('div');
      el.className = 'msg' + (isOwn ? ' own' : '');

      const time = new Date(msg.timestamp).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });

      el.innerHTML = `
        <span class="msg-time">${time}</span>
        <span class="msg-name" style="color:${msg.color}">${escHtml(msg.name)}</span>
        <span class="msg-sep">›</span>
        <span class="msg-text">${escHtml(msg.text)}</span>
      `;
      container.appendChild(el);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scrollBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  // ─── Typing ───
  let typingNames = {};

  function showTyping(name, color) {
    typingNames[name] = { color, ts: Date.now() };
    renderTyping();
    clearTimeout(typingClearTimers[name]);
    typingClearTimers[name] = setTimeout(() => {
      delete typingNames[name];
      renderTyping();
    }, 2500);
  }

  function renderTyping() {
    const bar = document.getElementById('typingBar');
    const names = Object.entries(typingNames);
    if (!names.length) { bar.textContent = ''; return; }
    const parts = names.map(([n, { color }]) => `<span style="color:${color}">${escHtml(n)}</span>`);
    bar.innerHTML = `${parts.join(', ')} ${names.length === 1 ? 'is' : 'are'} typing<span class="dots">...</span>`;
  }

  // ─── Input ───
  const msgInput = document.getElementById('msgInput');
  const charCount = document.getElementById('charCount');

  msgInput.addEventListener('input', () => {
    const left = 500 - msgInput.value.length;
    charCount.textContent = left;
    charCount.className = 'char-count' + (left < 50 ? (left < 10 ? ' over' : ' near') : '');

    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    clearTimeout(typingTimeout);
    ws.send(JSON.stringify({ type: 'typing' }));
    typingTimeout = setTimeout(() => {}, 2000);
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'message', text }));
    msgInput.value = '';
    charCount.textContent = '500';
    charCount.className = 'char-count';
    msgInput.focus();
  }
</script>
</body>
</html>
